            <h1 class="fw-bold text-center mb-4">Contact Me</h1>
            <p class="lead text-center mb-5">Have a project or question? Get in touch with me!</p>

            <div class="row justify-content-center">
                <div class="col-md-8">
                    <!-- Formspree contact form -->
                    <form action="https://formspree.io/f/mzdznozr" method="POST" class="bg-white p-4 shadow rounded">
                        <div class="mb-3">
                            <label for="name" class="form-label">Your Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Your Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Your Message</label>
                            <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Send Message</button>
                    </form>
                    <p class="text-muted mt-2">*Powered by Formspree for static hosting*</p>
                </div>
            </div>
